name: CI/CD Pipeline — pbitrading

on:
  push:
    branches:
    - main

jobs:

  # ─────────────────────────────────────────
  # Job 1 : Lint — qualité du code
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

  # ─────────────────────────────────────────
  # Job 2 : Build & Test
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint # ← attend que Lint soit ✅
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  # ─────────────────────────────────────────
  # Job 3 : Docker Build & Push
  # ─────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test # ← attend que Build & Test soit ✅
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/pbitrading-app:latest

  # ─────────────────────────────────────────
  # Job 4 : Deploy — mise à jour sur le VPS
  # ─────────────────────────────────────────
  deploy:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: docker-build-push # ← attend que Docker Build & Push soit ✅
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd ~/PROJET-CLIENTS/PBITRADING
          docker compose pull
          docker compose up -d
          docker image prune -f
